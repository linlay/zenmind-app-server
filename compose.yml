services:
  app-server-backend:
    image: app-server-backend
    restart: unless-stopped
    build:
      context: ./backend
    container_name: app-server-backend
    env_file:
      - ./.env
    environment:
      SERVER_PORT: "8080"
    volumes:
      - ./data:/data
    expose:
      - "8080"
    networks:
      zenmind-network:
        aliases:
          - app-server-backend

  app-server-frontend:
    image: app-server-frontend
    restart: unless-stopped
    build:
      context: ./frontend
    container_name: app-server-frontend
    depends_on:
      - app-server-backend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      zenmind-network:
        aliases:
          - app-server-frontend

networks:
  zenmind-network:
    external: true
