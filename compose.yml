services:
  app-server-backend:
    image: app-server-backend
    build:
      context: ./backend
    container_name: app-server-backend
    env_file:
      - ./.env
    environment:
      SERVER_PORT: "8080"
    volumes:
      - ./data:/data
    expose:
      - "8080"
    networks:
      zenmind-network:
        aliases:
          - app-server-backend

  app-server-frontend:
    image: app-server-frontend
    build:
      context: ./frontend
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/admin/}
    container_name: app-server-frontend
    depends_on:
      - app-server-backend
    environment:
      BACKEND_TARGET: http://app-server-backend:8080
      STATIC_DIR: /app/dist
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      zenmind-network:
        aliases:
          - app-server-frontend

networks:
  zenmind-network:
    external: true
