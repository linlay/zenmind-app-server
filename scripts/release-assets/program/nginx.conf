worker_processes 1;
pid __NGINX_PID_FILE__;

events {
    worker_connections 1024;
}

http {
    default_type application/octet-stream;
    access_log __NGINX_ACCESS_LOG__;
    error_log __NGINX_ERROR_LOG__;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen __FRONTEND_PORT__;
        server_name 127.0.0.1 localhost;

        location /admin/api/ {
            proxy_pass http://127.0.0.1:__SERVER_PORT__/admin/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /oauth2/ {
            proxy_pass http://127.0.0.1:__SERVER_PORT__/oauth2/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openid/ {
            proxy_pass http://127.0.0.1:__SERVER_PORT__/openid/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:__SERVER_PORT__/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = / {
            return 302 /admin/;
        }

        location = /admin {
            return 301 /admin/;
        }

        location /admin/ {
            alias __DIST_DIR__/;
            try_files $uri $uri/ /admin/index.html;
        }
    }
}
